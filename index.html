    const { useState, useMemo, useEffect } = React;

     const firebaseConfig = {

    // =========================================================

    // --- 圖示元件 ---
    const ShoppingCart = ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>;
    const Plus = ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>;
    const Minus = ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/></svg>;

    const SettingsIcon = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>;
    const Camera = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>;
    const ImageIcon = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>;
    const Lock = ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;
    const LogOut = ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>;
    const ImagePlus = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7"/><line x1="16" y1="5" x2="22" y2="5"/><line x1="19" y1="2" x2="19" y2="8"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>;
    const Trash2 = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>;
    const ChevronRight = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>;
    const MapPin = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>;
    const Phone = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>;
    const Mail = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>;
    const Truck = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10 17h4V5H2v12h3"/><path d="M20 17h2v-3.34a4 4 0 0 0-1.17-2.83L19 9h-5v8h2"/><path d="M14 9h5.51"/><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/></svg>;

    // 預設商品資料 (新增 isPromo 欄位判斷是否參與活動)
    const getBaseProduct = (id, name, desc, weight, price, category, image, isPromo = false) => ({
      id, name, desc, weight, price, category, image,
      intro: '', ingredients: '', notices: '', extraImages: [], isPromo
    });

    const defaultProducts = [
      getBaseProduct('AA01', '綜合原味堅果', '含腰果、杏仁、核桃、夏威夷豆、胡桃', '400克', 300, '堅果系列', 'https://images.unsplash.com/photo-1599598425947-33002620dc24?auto=format&fit=crop&w=300&q=80'),
      getBaseProduct('AA02', '原味腰果', '產地: 越南', '420克', 290, '堅果系列', 'https://images.unsplash.com/photo-1596591321045-812bc6547847?auto=format&fit=crop&w=300&q=80'),
      getBaseProduct('AA03', '原味杏仁果', '產地: 美國', '480克', 290, '堅果系列', 'https://images.unsplash.com/photo-1600189021966-38448880e6fc?auto=format&fit=crop&w=300&q=80'),
      getBaseProduct('AA04', '原味核桃', '產地: 美國', '420克', 290, '堅果系列', 'https://images.unsplash.com/photo-1595089601334-032228807d9f?auto=format&fit=crop&w=300&q=80'),
      getBaseProduct('AA05', '原味夏威夷豆', '產地: 澳洲', '250克', 290, '堅果系列', 'https://images.unsplash.com/photo-1560064560-692556af10c2?auto=format&fit=crop&w=300&q=80'),
      getBaseProduct('AA06', '原味胡桃', '產地: 美國', '280克', 290, '堅果系列', 'https://images.unsplash.com/photo-1574345229051-5079a40594db?auto=format&fit=crop&w=300&q=80'),
      getBaseProduct('AA07', '原味南瓜子', '', '430克', 290, '堅果系列', 'https://images.unsplash.com/photo-1600854298132-72cba2dfbb61?auto=format&fit=crop&w=300&q=80'),
      getBaseProduct('AA09', '蔓越莓果粒', '', '600克', 290, '果乾系列', 'https://images.unsplash.com/photo-1628588523555-52077e68270d?auto=format&fit=crop&w=300&q=80'),
      getBaseProduct('BB02', '南棗核桃糕', '', '300克', 270, '糖果軟糕', 'https://images.unsplash.com/photo-1582293041079-7814c2f12063?auto=format&fit=crop&w=300&q=80'),
      getBaseProduct('BB03', '南棗夏威夷豆軟糕', '', '300克', 350, '糖果軟糕', 'https://images.unsplash.com/photo-1621236166155-3818e697d446?auto=format&fit=crop&w=300&q=80'),
      getBaseProduct('B06', '夏威夷豆牛軋糖', '', '300克', 320, '糖果軟糕', 'https://images.unsplash.com/photo-1549449339-bb46cb2ce963?auto=format&fit=crop&w=300&q=80'),
      getBaseProduct('B10', '夏威夷豆牛奶糖', '', '300克', 350, '糖果軟糕', 'https://images.unsplash.com/photo-1506458961255-571f40df5aad?auto=format&fit=crop&w=300&q=80'),
      getBaseProduct('CC19', '黑金磚養生芝麻軟糖', '參與任選優惠活動', '300克', 200, '酥糖系列(3包550)', 'https://images.unsplash.com/photo-1610435427181-229ea45147be?auto=format&fit=crop&w=300&q=80', true),
      getBaseProduct('C02', '杏仁酥', '參與任選優惠活動', '200克', 200, '酥糖系列(3包550)', 'https://images.unsplash.com/photo-1605206786523-22870ad46718?auto=format&fit=crop&w=300&q=80', true),
      getBaseProduct('C03', '南瓜子酥', '參與任選優惠活動', '200克', 200, '酥糖系列(3包550)', 'https://images.unsplash.com/photo-1598155523122-3842334d6c1f?auto=format&fit=crop&w=300&q=80', true)
    ];

    // 系統預設設定
    const defaultStoreConfig = {
      shippingFee: 100,             // 運費
      freeShippingThreshold: 12,    // 滿幾包免運
      promoQty: 3,                  // 優惠組合件數
      promoPrice: 550,              // 優惠組合價格
      wholesaleThreshold: 12        // 批發優惠提示門檻
    };

    function App() {
      // --- 狀態管理 ---
      const [isAdminMode, setIsAdminMode] = useState(false);
      const [showLoginModal, setShowLoginModal] = useState(false);
      const [emailInput, setEmailInput] = useState('');
      const [passwordInput, setPasswordInput] = useState('');

      const [logo, setLogo] = useState(null);
      const [products, setProducts] = useState(defaultProducts);
      const [storeConfig, setStoreConfig] = useState(defaultStoreConfig);

      const [cart, setCart] = useState({});
      const [isCartOpen, setIsCartOpen] = useState(false);
      const [customerInfo, setCustomerInfo] = useState({ name: '', phone: '', address: '' });
      const [activeCategory, setActiveCategory] = useState('全部');
      const [deliveryMethod, setDeliveryMethod] = useState('delivery');

      // 詳情/編輯彈窗狀態
      const [editingProduct, setEditingProduct] = useState(null); 
      const [mainDisplayImg, setMainDisplayImg] = useState(''); 

      // 聯絡我們狀態
      const [showContactModal, setShowContactModal] = useState(false);
      const [contactData, setContactData] = useState({ address: '', phone: '', lineLink: '', email: '' });

      // 系統設定彈窗狀態
      const [showConfigModal, setShowConfigModal] = useState(false);
      const [tempConfig, setTempConfig] = useState(defaultStoreConfig);

      // --- 🚀 Firebase 資料庫與驗證邏輯 ---
      useEffect(() => {
        if (!db || !auth) return;

        const unsubscribeAuth = auth.onAuthStateChanged(user => setIsAdminMode(!!user));

        const unsubscribeLogo = db.collection('settings').doc('store').onSnapshot(doc => {
          if (doc.exists && doc.data().logo) setLogo(doc.data().logo);
        });

        const unsubscribeContact = db.collection('settings').doc('contact').onSnapshot(doc => {
          if (doc.exists) setContactData({ address: '', phone: '', lineLink: '', email: '', ...doc.data() });
        });

        // 監聽系統規則設定
        const unsubscribeConfig = db.collection('settings').doc('config').onSnapshot(doc => {
          if (doc.exists) setStoreConfig({ ...defaultStoreConfig, ...doc.data() });
        });

        const unsubscribeProducts = db.collection('products').onSnapshot(snapshot => {
          if (snapshot.empty) {
            defaultProducts.forEach(p => db.collection('products').doc(p.id).set(p));
          } else {
            const items = snapshot.docs.map(doc => doc.data());
            items.sort((a, b) => a.id.localeCompare(b.id));
            setProducts(items);
          }
        });

        return () => {
          unsubscribeAuth();
          unsubscribeLogo();
          unsubscribeContact();
          unsubscribeConfig();
          unsubscribeProducts();
        };
      }, []);

      // --- 圖片上傳邏輯 ---
      const handleImageUpload = (file, callback) => {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const MAX_WIDTH = 500;
            let width = img.width;
            let height = img.height;
            if (width > MAX_WIDTH) { height = Math.round((height * MAX_WIDTH) / width); width = MAX_WIDTH; }
            canvas.width = width; canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            callback(canvas.toDataURL('image/jpeg', 0.8));
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      };

      const onLogoChange = (e) => {
        handleImageUpload(e.target.files[0], (base64Str) => {
          if (db) db.collection('settings').doc('store').set({ logo: base64Str }, { merge: true });
          else setLogo(base64Str);
        });
      };

      // --- 購物車與結帳邏輯 ---
      const categories = ['全部', ...new Set(products.map(p => p.category))];
      const displayedCategories = activeCategory === '全部' ? categories.filter(c => c !== '全部') : [activeCategory];

      const updateCart = (id, delta) => {
        setCart(prev => {
          const currentQty = prev[id] || 0;
          const newQty = currentQty + delta;
          if (newQty <= 0) { const newCart = { ...prev }; delete newCart[id]; return newCart; }
          return { ...prev, [id]: newQty };
        });
      };

      // ✨ 進階智慧購物車結算邏輯
      const cartData = useMemo(() => {
        let totalQty = 0;
        let nonPromoPrice = 0;
        let promoItemsExpanded = []; // 收集所有參與優惠的商品單價

        const items = Object.entries(cart).map(([id, qty]) => {
          const product = products.find(p => p.id === id);
          if(!product) return null;
          
          totalQty += qty;
          
          if (product.isPromo) {
            // 將每個優惠商品獨立展開，以便後續排序與組合 (確保客人享有最大折扣)
            for(let i = 0; i < qty; i++) { promoItemsExpanded.push(product.price); }
          } else {
            nonPromoPrice += product.price * qty;
          }
          return { ...product, qty };
        }).filter(Boolean);

        // 優惠商品從高價排到低價 (讓客人優先用高價品湊組合，最划算)
        promoItemsExpanded.sort((a,b) => b - a);
        
        const promoSets = Math.floor(promoItemsExpanded.length / storeConfig.promoQty);
        const promoTotal = promoSets * storeConfig.promoPrice;
        
        // 湊不成組合的剩餘商品，以原價計算
        let remainderTotal = 0;
        for(let i = promoSets * storeConfig.promoQty; i < promoItemsExpanded.length; i++) {
          remainderTotal += promoItemsExpanded[i];
        }

        const itemsBaseTotal = items.reduce((sum, item) => sum + item.price * item.qty, 0);
        const currentTotal = nonPromoPrice + promoTotal + remainderTotal;
        const discountAmount = itemsBaseTotal - currentTotal; // 省下多少錢

        // 運費計算邏輯
        let shippingFee = 0;
        if (deliveryMethod === 'delivery') {
          if (totalQty < storeConfig.freeShippingThreshold) {
            shippingFee = storeConfig.shippingFee;
          }
        }
        
        const finalPrice = currentTotal + shippingFee;

        return { items, totalQty, currentTotal, finalPrice, shippingFee, discountAmount, itemsBaseTotal };
      }, [cart, products, storeConfig, deliveryMethod]);

      const handleCheckout = () => {
        if (cartData.totalQty === 0) return;
        if (!customerInfo.name || !customerInfo.phone) return alert("請填寫訂購人姓名與電話哦！");
        if (deliveryMethod === 'delivery' && !customerInfo.address) return alert("選擇宅配請務必填寫收件地址哦！");

        let orderText = `*【木子家 MUZI MAISON 訂單】*\n\n`;
        orderText += `訂購人：${customerInfo.name}\n`;
        orderText += `聯絡電話：${customerInfo.phone}\n`;
        orderText += `取貨方式：${deliveryMethod === 'delivery' ? '宅配' : '自取'}\n`;
        if (deliveryMethod === 'delivery') orderText += `宅配地址：${customerInfo.address}\n`;
        orderText += `----------------------\n`;
        cartData.items.forEach(item => orderText += `▪️ ${item.name} (${item.weight})\n   x ${item.qty} 包\n`);
        orderText += `----------------------\n`;
        orderText += `商品小計：$${cartData.itemsBaseTotal}\n`;
        if (cartData.discountAmount > 0) orderText += `已折抵優惠：-$${cartData.discountAmount}\n`;
        
        if (deliveryMethod === 'delivery') {
          if (cartData.shippingFee === 0) orderText += `運費：$0 (滿件免運)\n`;
          else orderText += `運費：$${cartData.shippingFee}\n`;
        } else {
          orderText += `運費：$0 (自取)\n`;
        }
        
        orderText += `*總計金額：$${cartData.finalPrice}*\n`;
        
        if (cartData.totalQty >= storeConfig.wholesaleThreshold) {
          orderText += `(💡 已達${storeConfig.wholesaleThreshold}包以上，將由專人為您重新報價優惠！)\n`;
        }
        orderText += `\n(⚠️ 提醒您：為保持良好的賞味，皆7～15天出貨，煩請先匯款哦！)\n`;

        window.open(`https://line.me/R/msg/text/?${encodeURIComponent(orderText)}`, '_blank');
      };

      // --- 登入邏輯 ---
      const handleLoginSubmit = () => {
        if (!auth) return alert("請先完成 Firebase 金鑰設定哦！");
        auth.signInWithEmailAndPassword(emailInput, passwordInput)
          .then(() => { setShowLoginModal(false); setEmailInput(''); setPasswordInput(''); })
          .catch((error) => { alert("登入失敗，請檢查帳號密碼是否正確！"); console.error(error); });
      };

      // --- 商品編輯與新增邏輯 ---
      const openProductDetail = (product) => {
        const fullProduct = { intro: '', ingredients: '', notices: '', extraImages: [], isPromo: false, isNew: false, ...product };
        setEditingProduct(fullProduct);
        setMainDisplayImg(fullProduct.image || '');
      };

      const handleAddProduct = () => {
        setEditingProduct({
          id: '', name: '', desc: '', weight: '', price: 0, category: '精選商品', 
          image: '', intro: '', ingredients: '', notices: '', extraImages: [], isPromo: false, isNew: true
        });
        setMainDisplayImg('');
      };

      const saveProductDetail = async () => {
        if (editingProduct.isNew && !editingProduct.id.trim()) {
          return alert("請務必輸入「商品品號」！(例如: D01)");
        }
        const prodData = {
          id: editingProduct.id.trim(),
          name: editingProduct.name || '未命名商品',
          desc: editingProduct.desc || '',
          weight: editingProduct.weight || '',
          price: Number(editingProduct.price) || 0,
          category: editingProduct.category || '精選商品',
          image: editingProduct.image || 'https://via.placeholder.com/300x300?text=No+Image',
          intro: editingProduct.intro || '',
          ingredients: editingProduct.ingredients || '',
          notices: editingProduct.notices || '',
          extraImages: editingProduct.extraImages || [],
          isPromo: editingProduct.isPromo || false
        };

        if (db) {
          await db.collection('products').doc(prodData.id).set(prodData);
        } else {
          if (editingProduct.isNew) setProducts([...products, prodData]);
          else setProducts(prev => prev.map(p => p.id === prodData.id ? prodData : p));
        }
        setEditingProduct(null); 
      };

      const handleDeleteProduct = async () => {
        if (!window.confirm(`確定要刪除「${editingProduct.name}」嗎？這個動作無法復原喔！`)) return;
        if (db) {
          await db.collection('products').doc(editingProduct.id).delete();
        } else {
          setProducts(prev => prev.filter(p => p.id !== editingProduct.id));
        }
        setEditingProduct(null);
      };

      // --- 設定檔儲存 ---
      const saveContactInfo = async () => {
        if (db) await db.collection('settings').doc('contact').set(contactData, { merge: true });
        setShowContactModal(false);
      };

      const saveSystemConfig = async () => {
        const configToSave = {
          shippingFee: Number(tempConfig.shippingFee) || 0,
          freeShippingThreshold: Number(tempConfig.freeShippingThreshold) || 0,
          promoQty: Number(tempConfig.promoQty) || 1,
          promoPrice: Number(tempConfig.promoPrice) || 0,
          wholesaleThreshold: Number(tempConfig.wholesaleThreshold) || 0,
        };
        if (db) await db.collection('settings').doc('config').set(configToSave, { merge: true });
        setStoreConfig(configToSave);
        setShowConfigModal(false);
      };

      return (
        <div className="max-w-md mx-auto bg-[#Fdfbf7] min-h-screen relative font-sans text-stone-800 shadow-xl overflow-hidden flex flex-col">
          <div className="sticky top-0 z-20 bg-white shadow-sm">
            <header className="px-4 py-3 flex items-center justify-between">
              <div className="flex items-center gap-3 relative">
                <label className={`relative block h-12 min-w-[3rem] max-w-[150px] flex items-center justify-center ${isAdminMode ? 'cursor-pointer hover:ring-2 hover:ring-amber-400 p-1 rounded-lg border border-dashed border-stone-300' : ''}`}>
                  {logo ? <img src={logo} alt="Logo" className="max-w-full max-h-full object-contain" /> : <div className="w-10 h-10 bg-amber-100 rounded-full flex items-center justify-center"><Store size={20} className="text-amber-700" /></div>}
                  {isAdminMode && <div className="absolute inset-0 bg-black/40 flex items-center justify-center rounded-lg"><Camera size={18} className="text-white" /></div>}
                  {isAdminMode && <input type="file" accept="image/*" className="hidden" onChange={onLogoChange} />}
                </label>
                <div>
                  <h1 className="text-xl font-bold tracking-wider text-stone-700">木子家</h1>
                  <div className="flex items-center gap-2">
                    <p className="text-[10px] text-stone-400 font-semibold tracking-widest uppercase">Muzi Maison</p>
                    <button onClick={() => setShowContactModal(true)} className="text-[10px] font-bold text-amber-600 bg-amber-50 px-1.5 py-0.5 rounded shadow-sm hover:bg-amber-100 transition-colors">聯絡我們</button>
                    {/* ⚙️ 系統設定按鈕 (僅管理員可見) */}
                    {isAdminMode && (
                      <button onClick={() => { setTempConfig(storeConfig); setShowConfigModal(true); }} className="text-[10px] font-bold text-rose-600 bg-rose-50 px-1.5 py-0.5 rounded shadow-sm hover:bg-rose-100 transition-colors flex items-center gap-1">
                        <SettingsIcon size={12} /> 系統設定
                      </button>
                    )}
                  </div>
                </div>
              </div>
              
              <button onClick={() => isAdminMode && auth ? auth.signOut() : setShowLoginModal(true)} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-bold transition-colors ${isAdminMode ? 'bg-stone-800 text-white shadow-md' : 'bg-stone-100 text-stone-500 hover:bg-stone-200'}`}>
                {isAdminMode ? <LogOut size={14} /> : <Lock size={14} />}
                {isAdminMode ? '登出' : '管理員'}
              </button>
            </header>
            <div className="px-4 pb-3 flex gap-2 overflow-x-auto [&::-webkit-scrollbar]:hidden [-ms-overflow-style:none] [scrollbar-width:none]">
              {categories.map(category => (
                <button key={category} onClick={() => setActiveCategory(category)} className={`whitespace-nowrap px-4 py-1.5 rounded-full text-sm font-medium transition-colors ${activeCategory === category ? 'bg-stone-800 text-white shadow-sm' : 'bg-stone-100 text-stone-600 hover:bg-stone-200'}`}>
                  {category}
                </button>
              ))}
            </div>
          </div>

          {/* 動態優惠跑馬燈 */}
          {isAdminMode ? (
            <div className="bg-rose-50 text-rose-700 text-xs py-2 px-4 text-center font-bold">🛠️ 管理模式：可新增商品、編輯內容，左上角可修改系統設定。</div>
          ) : (
            <div className="bg-amber-50 text-amber-700 text-xs py-2 px-4 flex items-center gap-2 overflow-hidden relative">
              <Info size={14} className="shrink-0" />
              <div className="whitespace-nowrap animate-[marquee_15s_linear_infinite] w-full">
                <span>活動商品任選 <strong>{storeConfig.promoQty}包優惠 {storeConfig.promoPrice}元</strong>！滿 <strong>{storeConfig.freeShippingThreshold}包</strong> 享免運。滿 {storeConfig.wholesaleThreshold}包另有優惠。</span>
              </div>
            </div>
          )}

          <main className="flex-1 overflow-y-auto pb-24 px-4">
            {/* 新增商品按鈕 */}
            {isAdminMode && (
              <button onClick={handleAddProduct} className="w-full mt-4 bg-white border-2 border-dashed border-stone-300 rounded-2xl p-4 text-stone-500 font-bold flex flex-col items-center justify-center gap-2 hover:border-amber-500 hover:text-amber-600 transition-colors">
                <div className="bg-stone-100 p-2 rounded-full"><Plus size={24} /></div>
                新增商品
              </button>
            )}

            {displayedCategories.map(category => (
              <div key={category} className="mt-6">
                <h2 className="text-lg font-bold mb-3 text-stone-700 flex items-center gap-2 border-b border-stone-200 pb-1">{category}</h2>
                <div className="flex flex-col gap-4">
                  {products.filter(p => p.category === category).map(product => (
                    <div key={product.id} className="bg-white rounded-2xl p-3 shadow-sm flex gap-4 border border-stone-100 relative group overflow-hidden">
                      {/* 商品圖片 */}
                      <div className="relative block w-24 h-24 rounded-xl shrink-0 overflow-hidden cursor-pointer hover:ring-2 hover:ring-amber-400 transition-all" onClick={() => openProductDetail(product)}>
                        <img src={product.image} alt={product.name} className="w-full h-full object-cover" />
                        <div className="absolute inset-0 bg-black/10 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                          <span className="bg-white/90 text-stone-800 text-[10px] font-bold px-2 py-1 rounded-full">{isAdminMode ? '編輯詳情' : '查看詳情'}</span>
                        </div>
                        {product.isPromo && (
                          <div className="absolute top-0 left-0 bg-rose-500 text-white text-[9px] font-bold px-1.5 py-0.5 rounded-br-lg z-10 shadow-sm">
                            活動
                          </div>
                        )}
                      </div>

                      {/* 商品簡介 */}
                      <div className="flex-1 flex flex-col justify-between py-0.5">
                        <div onClick={() => openProductDetail(product)} className="cursor-pointer">
                          <h3 className="font-bold text-stone-800 leading-tight flex items-center justify-between">
                            {product.name}
                            <ChevronRight size={16} className="text-stone-300" />
                          </h3>
                          {product.desc && <p className="text-xs text-stone-500 mt-1">{product.desc}</p>}
                          <span className="inline-block mt-1 px-2 py-0.5 bg-stone-100 text-stone-500 text-[10px] rounded-md">{product.weight}</span>
                        </div>
                        
                        <div className="flex items-center justify-between mt-2">
                          <span className="text-lg font-bold text-amber-600">${product.price}</span>
                          {!isAdminMode && (
                            <div className="flex items-center gap-3 bg-stone-50 rounded-full px-2 py-1 border border-stone-200">
                              <button onClick={() => updateCart(product.id, -1)} className="w-6 h-6 rounded-full flex items-center justify-center text-stone-500 hover:bg-stone-200 active:bg-stone-300"><Minus size={14} /></button>
                              <span className="w-4 text-center text-sm font-bold">{cart[product.id] || 0}</span>
                              <button onClick={() => updateCart(product.id, 1)} className="w-6 h-6 rounded-full bg-amber-500 text-white flex items-center justify-center shadow-sm active:bg-amber-600"><Plus size={14} /></button>
                            </div>
                          )}
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </main>

          {/* 🌟 商品詳情與編輯彈出視窗 */}
          {editingProduct && (
            <div className="fixed inset-0 z-50 flex justify-center items-end sm:items-center bg-black/60 backdrop-blur-sm">
              <div className="bg-[#Fdfbf7] w-full max-w-md h-[90vh] sm:h-[85vh] rounded-t-3xl sm:rounded-3xl flex flex-col overflow-hidden shadow-2xl animate-in slide-in-from-bottom-full duration-300">
                
                <div className="flex items-center justify-between p-4 bg-white/80 backdrop-blur-md absolute top-0 left-0 right-0 z-10 border-b border-stone-100 shadow-sm">
                  <h2 className="font-bold text-stone-800 flex-1 truncate pr-4">
                    {isAdminMode ? (editingProduct.isNew ? '新增商品' : '編輯商品詳情') : editingProduct.name}
                  </h2>
                  <button onClick={() => setEditingProduct(null)} className="w-8 h-8 flex items-center justify-center bg-stone-100 rounded-full text-stone-500"><X size={20} /></button>
                </div>

                <div className="flex-1 overflow-y-auto pt-16 pb-24">
                  {/* 照片區 */}
                  <div className="w-full h-64 bg-stone-200 flex-shrink-0 relative">
                    {mainDisplayImg ? <img src={mainDisplayImg} className="w-full h-full object-cover" alt="Product" /> : <div className="w-full h-full flex items-center justify-center text-stone-400 bg-stone-100"><ImageIcon size={48} opacity={0.5}/></div>}
                  </div>
                  <div className="flex gap-2 p-4 overflow-x-auto [&::-webkit-scrollbar]:hidden bg-white shadow-sm relative z-0">
                    <div className="relative shrink-0">
                      <img src={editingProduct.image || 'https://via.placeholder.com/150?text=Empty'} onClick={() => editingProduct.image && setMainDisplayImg(editingProduct.image)} className={`w-16 h-16 object-cover rounded-lg cursor-pointer border-2 ${mainDisplayImg === editingProduct.image ? 'border-amber-500' : 'border-stone-200'}`} />
                      {isAdminMode && (
                        <label className="absolute inset-0 bg-black/40 flex items-center justify-center rounded-lg cursor-pointer hover:bg-black/50 transition-colors">
                          <Camera size={16} className="text-white" />
                          <input type="file" accept="image/*" className="hidden" onChange={(e) => handleImageUpload(e.target.files[0], (img) => { setEditingProduct({...editingProduct, image: img}); setMainDisplayImg(img); })} />
                        </label>
                      )}
                      <span className="absolute -bottom-2 left-1/2 -translate-x-1/2 bg-amber-500 text-white text-[8px] px-1.5 rounded-full whitespace-nowrap shadow-sm">封面圖</span>
                    </div>

                    {(editingProduct.extraImages || []).map((img, idx) => (
                      <div key={idx} className="relative shrink-0 group">
                        <img src={img} onClick={() => setMainDisplayImg(img)} className={`w-16 h-16 object-cover rounded-lg cursor-pointer border-2 ${mainDisplayImg === img ? 'border-amber-500' : 'border-stone-200'}`} />
                        {isAdminMode && (
                          <button onClick={() => { const newExtra = [...editingProduct.extraImages]; newExtra.splice(idx, 1); setEditingProduct({...editingProduct, extraImages: newExtra}); if(mainDisplayImg === img) setMainDisplayImg(editingProduct.image); }} className="absolute -top-1 -right-1 bg-red-500 text-white w-5 h-5 rounded-full flex items-center justify-center shadow-md"><X size={12} /></button>
                        )}
                      </div>
                    ))}

                    {isAdminMode && (editingProduct.extraImages || []).length < 4 && (
                      <label className="w-16 h-16 shrink-0 border-2 border-dashed border-stone-300 rounded-lg flex flex-col items-center justify-center text-stone-400 cursor-pointer hover:bg-stone-50 hover:text-amber-500 hover:border-amber-500 transition-colors">
                        <ImagePlus size={20} />
                        <span className="text-[10px] mt-1 font-bold">加照片</span>
                        <input type="file" accept="image/*" className="hidden" onChange={(e) => handleImageUpload(e.target.files[0], (img) => setEditingProduct({...editingProduct, extraImages: [...(editingProduct.extraImages||[]), img]}))} />
                      </label>
                    )}
                  </div>

                  <div className="p-5 space-y-5">
                    {/* 基礎資訊表單 (管理員) */}
                    {isAdminMode ? (
                      <div className="bg-stone-50 p-4 rounded-2xl border border-stone-200 space-y-3">
                        <h3 className="font-bold text-stone-800 border-b border-stone-200 pb-2 mb-2 flex justify-between items-center">
                          基礎設定
                          <label className="flex items-center gap-1.5 text-xs bg-rose-100 text-rose-700 px-2 py-1 rounded-md cursor-pointer hover:bg-rose-200 transition-colors">
                            <input type="checkbox" checked={editingProduct.isPromo} onChange={e => setEditingProduct({...editingProduct, isPromo: e.target.checked})} className="accent-rose-500 w-3 h-3" />
                            參與任選優惠
                          </label>
                        </h3>
                        <div className="flex gap-3">
                          <div className="flex-1">
                            <label className="text-xs font-bold text-stone-500 mb-1 block">品號 (系統ID)</label>
                            <input type="text" value={editingProduct.id} onChange={e => setEditingProduct({...editingProduct, id: e.target.value.toUpperCase()})} disabled={!editingProduct.isNew} placeholder="如: D01" className="w-full bg-white border border-stone-300 rounded-lg p-2 text-sm outline-none focus:border-amber-500 disabled:bg-stone-100 disabled:text-stone-400" />
                          </div>
                          <div className="flex-[1.5]">
                            <label className="text-xs font-bold text-stone-500 mb-1 block">商品名稱</label>
                            <input type="text" value={editingProduct.name} onChange={e => setEditingProduct({...editingProduct, name: e.target.value})} placeholder="請輸入名稱" className="w-full bg-white border border-stone-300 rounded-lg p-2 text-sm outline-none focus:border-amber-500" />
                          </div>
                        </div>
                        <div className="flex gap-3">
                          <div className="flex-1">
                            <label className="text-xs font-bold text-stone-500 mb-1 block">分類</label>
                            <input type="text" value={editingProduct.category} onChange={e => setEditingProduct({...editingProduct, category: e.target.value})} placeholder="如: 堅果系列" className="w-full bg-white border border-stone-300 rounded-lg p-2 text-sm outline-none focus:border-amber-500" />
                          </div>
                          <div className="flex-1">
                            <label className="text-xs font-bold text-stone-500 mb-1 block">售價 ($)</label>
                            <input type="number" value={editingProduct.price} onChange={e => setEditingProduct({...editingProduct, price: e.target.value})} className="w-full bg-white border border-stone-300 rounded-lg p-2 text-sm outline-none focus:border-amber-500 text-amber-600 font-bold" />
                          </div>
                        </div>
                        <div>
                          <label className="text-xs font-bold text-stone-500 mb-1 block">副標題/簡介</label>
                          <input type="text" value={editingProduct.desc} onChange={e => setEditingProduct({...editingProduct, desc: e.target.value})} placeholder="列表顯示的一行簡介" className="w-full bg-white border border-stone-300 rounded-lg p-2 text-sm outline-none focus:border-amber-500" />
                        </div>
                      </div>
                    ) : (
                      <div>
                        {editingProduct.isPromo && <span className="inline-block bg-rose-100 text-rose-600 text-[10px] font-bold px-2 py-0.5 rounded-md mb-2 border border-rose-200">享任選優惠活動</span>}
                        <div className="text-3xl font-bold text-amber-600 mb-1">${editingProduct.price}</div>
                        <h1 className="text-2xl font-bold text-stone-800">{editingProduct.name}</h1>
                        <p className="text-sm text-stone-500 mt-1">{editingProduct.desc}</p>
                      </div>
                    )}

                    <hr className="border-stone-200" />

                    {/* 詳細圖文區 */}
                    {(isAdminMode || editingProduct.intro) && (
                      <div className="space-y-1.5">
                        <h3 className="font-bold text-stone-700 flex items-center gap-1"><span className="w-1 h-4 bg-amber-500 rounded-full"></span> 產品介紹</h3>
                        {isAdminMode ? <textarea rows="3" value={editingProduct.intro} onChange={e => setEditingProduct({...editingProduct, intro: e.target.value})} placeholder="詳細的產品說明..." className="w-full bg-white border border-stone-300 rounded-lg p-2 text-sm outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500"></textarea> : <p className="text-sm text-stone-600 leading-relaxed whitespace-pre-wrap">{editingProduct.intro}</p>}
                      </div>
                    )}

                    {(isAdminMode || editingProduct.ingredients) && (
                      <div className="space-y-1.5">
                        <h3 className="font-bold text-stone-700 flex items-center gap-1"><span className="w-1 h-4 bg-emerald-500 rounded-full"></span> 產品成分</h3>
                        {isAdminMode ? <textarea rows="2" value={editingProduct.ingredients} onChange={e => setEditingProduct({...editingProduct, ingredients: e.target.value})} placeholder="成分說明..." className="w-full bg-white border border-stone-300 rounded-lg p-2 text-sm outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500"></textarea> : <p className="text-sm text-stone-600 leading-relaxed whitespace-pre-wrap">{editingProduct.ingredients}</p>}
                      </div>
                    )}

                    {(isAdminMode || editingProduct.weight) && (
                      <div className="space-y-1.5">
                        <h3 className="font-bold text-stone-700 flex items-center gap-1"><span className="w-1 h-4 bg-blue-500 rounded-full"></span> 產品重量</h3>
                        {isAdminMode ? <input type="text" value={editingProduct.weight} onChange={e => setEditingProduct({...editingProduct, weight: e.target.value})} placeholder="如: 400克" className="w-full bg-white border border-stone-300 rounded-lg p-2 text-sm outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500" /> : <p className="text-sm text-stone-600">{editingProduct.weight}</p>}
                      </div>
                    )}

                    {/* 注意事項 (加大到 50 行) */}
                    {(isAdminMode || editingProduct.notices) && (
                      <div className="space-y-1.5">
                        <h3 className="font-bold text-stone-700 flex items-center gap-1"><span className="w-1 h-4 bg-rose-500 rounded-full"></span> 注意事項</h3>
                        {isAdminMode ? (
                          <textarea rows="50" value={editingProduct.notices} onChange={e => setEditingProduct({...editingProduct, notices: e.target.value})} placeholder="過敏原資訊、保存期限..." className="w-full bg-white border border-stone-300 rounded-lg p-2 text-sm outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500"></textarea>
                        ) : (
                          <div className="bg-rose-50 text-rose-700 p-3 rounded-xl text-sm leading-relaxed whitespace-pre-wrap border border-rose-100">{editingProduct.notices}</div>
                        )}
                      </div>
                    )}
                  </div>
                </div>

                <div className="absolute bottom-0 left-0 right-0 p-4 bg-white border-t border-stone-200">
                  {isAdminMode ? (
                    <div className="flex gap-3">
                      {!editingProduct.isNew && (
                        <button onClick={handleDeleteProduct} className="bg-red-100 text-red-600 px-4 rounded-xl flex items-center justify-center hover:bg-red-200 transition-colors">
                          <Trash2 size={20} />
                        </button>
                      )}
                      <button onClick={saveProductDetail} className="flex-1 bg-stone-800 text-white font-bold py-3.5 rounded-xl shadow-lg active:scale-95 transition-transform">儲存商品</button>
                    </div>
                  ) : (
                    <div className="flex items-center gap-4">
                      <div className="flex items-center gap-4 bg-stone-50 rounded-xl px-4 py-3 border border-stone-200 flex-1 justify-center">
                        <button onClick={() => updateCart(editingProduct.id, -1)} className="p-1 text-stone-500"><Minus size={18} /></button>
                        <span className="w-6 text-center text-lg font-bold">{cart[editingProduct.id] || 0}</span>
                        <button onClick={() => updateCart(editingProduct.id, 1)} className="p-1 text-amber-600"><Plus size={18} /></button>
                      </div>
                      <button onClick={() => setEditingProduct(null)} className="flex-[1.5] bg-amber-500 text-white font-bold py-3.5 rounded-xl shadow-lg active:scale-95 transition-transform">確認返回</button>
                    </div>
                  )}
                </div>
              </div>
            </div>
          )}

          {/* 購物車懸浮按鈕 */}
          {cartData.totalQty > 0 && !isAdminMode && !editingProduct && (
            <div className="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-4 bg-gradient-to-t from-white via-white to-transparent pointer-events-none z-10">
              <button onClick={() => setIsCartOpen(true)} className="w-full bg-stone-800 text-white rounded-2xl p-4 flex items-center justify-between shadow-xl pointer-events-auto active:scale-95 transition-transform">
                <div className="flex items-center gap-3">
                  <div className="relative">
                    <ShoppingCart size={24} />
                    <span className="absolute -top-2 -right-2 bg-amber-500 text-white text-xs font-bold w-5 h-5 rounded-full flex items-center justify-center border-2 border-stone-800">{cartData.totalQty}</span>
                  </div>
                  <span className="font-medium">查看購物車</span>
                </div>
                <div className="text-lg font-bold">${cartData.currentTotal}</div>
              </button>
            </div>
          )}

          {/* 購物車結帳彈窗 */}
          {isCartOpen && (
            <div className="fixed inset-0 z-50 flex justify-center items-end bg-black/50 backdrop-blur-sm sm:items-center">
              <div className="w-full max-w-md bg-[#Fdfbf7] rounded-t-3xl sm:rounded-3xl h-[85vh] sm:h-auto sm:max-h-[85vh] flex flex-col shadow-2xl animate-in slide-in-from-bottom-full duration-300">
                <div className="flex items-center justify-between p-5 border-b border-stone-200">
                  <h2 className="text-xl font-bold text-stone-800 flex items-center gap-2"><ShoppingCart size={20} /> 訂單明細</h2>
                  <button onClick={() => setIsCartOpen(false)} className="w-8 h-8 flex items-center justify-center bg-stone-100 rounded-full text-stone-500"><X size={20} /></button>
                </div>
                <div className="flex-1 overflow-y-auto p-5">
                  {cartData.items.map(item => (
                    <div key={item.id} className="flex items-center justify-between py-3 border-b border-stone-100 last:border-0">
                      <div className="flex-1">
                        <h4 className="font-bold text-stone-800 flex items-center gap-1">
                          {item.name}
                          {item.isPromo && <span className="text-[9px] bg-rose-100 text-rose-600 px-1 py-0.5 rounded">活動</span>}
                        </h4>
                        <p className="text-xs text-stone-500">${item.price} /包</p>
                      </div>
                      <div className="flex items-center gap-4">
                        <div className="flex items-center gap-3 bg-white rounded-full px-2 py-1 border border-stone-200">
                          <button onClick={() => updateCart(item.id, -1)} className="p-1 text-stone-500"><Minus size={14} /></button>
                          <span className="w-4 text-center text-sm font-bold">{item.qty}</span>
                          <button onClick={() => updateCart(item.id, 1)} className="p-1 text-stone-800"><Plus size={14} /></button>
                        </div>
                        <div className="w-12 text-right font-bold text-stone-700">${item.price * item.qty}</div>
                      </div>
                    </div>
                  ))}

                  <div className="mt-6 space-y-4">
                    <h3 className="font-bold text-stone-800">聯絡資訊</h3>
                    <div><input type="text" placeholder="您的姓名" value={customerInfo.name} onChange={(e) => setCustomerInfo({...customerInfo, name: e.target.value})} className="w-full bg-white border border-stone-200 rounded-xl px-4 py-3 outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition-all"/></div>
                    <div><input type="tel" placeholder="聯絡電話" value={customerInfo.phone} onChange={(e) => setCustomerInfo({...customerInfo, phone: e.target.value})} className="w-full bg-white border border-stone-200 rounded-xl px-4 py-3 outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition-all"/></div>
                    <div className="pt-4 border-t border-stone-100">
                      <h3 className="font-bold text-stone-800 mb-3">取貨方式</h3>
                      <div className="flex gap-4 mb-4">
                        <label className={`flex-1 border rounded-xl p-3 flex flex-col items-center justify-center gap-1 cursor-pointer transition-colors ${deliveryMethod==='delivery' ? 'bg-amber-50 border-amber-500 text-amber-700' : 'bg-white border-stone-200 text-stone-500'}`}>
                          <input type="radio" name="delivery" value="delivery" checked={deliveryMethod === 'delivery'} onChange={(e) => setDeliveryMethod(e.target.value)} className="hidden" />
                          <Truck size={20} />
                          <span className="text-sm font-bold">宅配</span>
                          <span className="text-[10px]">{cartData.totalQty >= storeConfig.freeShippingThreshold ? '滿件免運' : `運費 $${storeConfig.shippingFee}`}</span>
                        </label>
                        <label className={`flex-1 border rounded-xl p-3 flex flex-col items-center justify-center gap-1 cursor-pointer transition-colors ${deliveryMethod==='pickup' ? 'bg-amber-50 border-amber-500 text-amber-700' : 'bg-white border-stone-200 text-stone-500'}`}>
                          <input type="radio" name="delivery" value="pickup" checked={deliveryMethod === 'pickup'} onChange={(e) => setDeliveryMethod(e.target.value)} className="hidden" />
                          <Store size={20} />
                          <span className="text-sm font-bold">自取</span>
                          <span className="text-[10px]">免運費</span>
                        </label>
                      </div>
                      {deliveryMethod === 'delivery' && (
                        <div className="mb-4">
                          <input type="text" placeholder="請輸入宅配收件地址" value={customerInfo.address} onChange={(e) => setCustomerInfo({...customerInfo, address: e.target.value})} className="w-full bg-white border border-stone-200 rounded-xl px-4 py-3 outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition-all"/>
                          {cartData.totalQty < storeConfig.freeShippingThreshold && (
                            <p className="text-xs text-rose-500 mt-2 ml-1">差 {storeConfig.freeShippingThreshold - cartData.totalQty} 件即可享免運優惠！</p>
                          )}
                        </div>
                      )}
                    </div>
                  </div>

                  <div className="mt-6 bg-white p-4 rounded-2xl border border-stone-100 shadow-sm space-y-2">
                    <div className="flex justify-between text-sm text-stone-600"><span>商品小計</span><span>${cartData.itemsBaseTotal}</span></div>
                    {cartData.discountAmount > 0 && <div className="flex justify-between text-sm text-rose-500 font-bold"><span>活動折抵</span><span>-${cartData.discountAmount}</span></div>}
                    
                    <div className="flex justify-between text-sm text-stone-600">
                      <span>運費</span>
                      <span className={cartData.shippingFee === 0 && deliveryMethod === 'delivery' ? 'text-emerald-500 font-bold' : ''}>
                        {cartData.shippingFee === 0 ? (deliveryMethod==='pickup' ? '$0' : '免運費') : `$${cartData.shippingFee}`}
                      </span>
                    </div>

                    {cartData.totalQty >= storeConfig.wholesaleThreshold && <div className="flex justify-between text-xs text-amber-600 bg-amber-50 p-2 rounded-lg mt-2 font-bold border border-amber-200"><span>⚠️ 已達{storeConfig.wholesaleThreshold}包批發門檻！訂單送出後由專人另行報價。</span></div>}
                    <div className="pt-2 mt-2 border-t border-stone-100 flex justify-between items-center"><span className="font-bold text-stone-800">總計金額</span><span className="text-2xl font-black text-stone-800">${cartData.finalPrice}</span></div>
                  </div>
                </div>
                <div className="p-5 border-t border-stone-200 bg-white">
                  <button onClick={handleCheckout} className="w-full bg-[#06C755] text-white font-bold rounded-2xl p-4 flex items-center justify-center gap-2 shadow-lg active:scale-95 transition-transform"><MessageCircle size={20} />發送訂單至 Line</button>
                  <p className="text-center text-[10px] text-stone-400 mt-3 font-medium">※ 為保持良好賞味，接單後7～15天出貨，敬請見諒</p>
                </div>
              </div>
            </div>
          )}

          {/* 🌟 系統設定彈出視窗 (僅管理員) */}
          {showConfigModal && (
            <div className="fixed inset-0 z-50 flex justify-center items-center bg-black/50 backdrop-blur-sm px-4">
              <div className="bg-white p-6 rounded-3xl shadow-2xl w-full max-w-sm animate-in zoom-in-95 duration-200 relative border border-stone-100">
                <button onClick={() => setShowConfigModal(false)} className="absolute top-4 right-4 text-stone-400 hover:bg-stone-100 p-1 rounded-full transition-colors"><X size={20} /></button>
                
                <h2 className="text-lg font-bold text-stone-800 mb-5 flex items-center gap-2 border-b border-stone-100 pb-3">
                  <SettingsIcon size={20} className="text-amber-600"/> 系統規則設定
                </h2>

                <div className="space-y-4">
                  {/* 運費規則 */}
                  <div className="bg-stone-50 p-3 rounded-xl border border-stone-200">
                    <p className="text-sm font-bold text-stone-700 mb-2 flex items-center gap-1"><Truck size={16}/> 運費與免運</p>
                    <div className="flex items-center justify-between mb-2">
                      <span className="text-xs text-stone-500">基本運費 ($)</span>
                      <input type="number" value={tempConfig.shippingFee} onChange={e => setTempConfig({...tempConfig, shippingFee: e.target.value})} className="w-20 bg-white border border-stone-300 rounded p-1 text-sm outline-none text-right font-bold focus:border-amber-500" />
                    </div>
                    <div className="flex items-center justify-between">
                      <span className="text-xs text-stone-500">免運門檻 (滿X件)</span>
                      <input type="number" value={tempConfig.freeShippingThreshold} onChange={e => setTempConfig({...tempConfig, freeShippingThreshold: e.target.value})} className="w-20 bg-white border border-stone-300 rounded p-1 text-sm outline-none text-right font-bold focus:border-amber-500" />
                    </div>
                  </div>

                  {/* 優惠活動規則 */}
                  <div className="bg-rose-50 p-3 rounded-xl border border-rose-100">
                    <p className="text-sm font-bold text-rose-700 mb-2 flex items-center gap-1"><Info size={16}/> 任選優惠活動</p>
                    <p className="text-[10px] text-rose-500 mb-2 leading-tight">商品編輯內需勾選「參與任選優惠」才會被列入計算。</p>
                    <div className="flex items-center gap-2">
                      <span className="text-xs text-stone-600">任選</span>
                      <input type="number" value={tempConfig.promoQty} onChange={e => setTempConfig({...tempConfig, promoQty: e.target.value})} className="w-16 bg-white border border-rose-200 rounded p-1 text-sm outline-none text-center font-bold text-rose-600 focus:border-rose-500" />
                      <span className="text-xs text-stone-600">件，優惠總價 $</span>
                      <input type="number" value={tempConfig.promoPrice} onChange={e => setTempConfig({...tempConfig, promoPrice: e.target.value})} className="w-20 bg-white border border-rose-200 rounded p-1 text-sm outline-none text-center font-bold text-rose-600 focus:border-rose-500" />
                    </div>
                  </div>

                  {/* 批發門檻 */}
                  <div className="bg-amber-50 p-3 rounded-xl border border-amber-200">
                    <p className="text-sm font-bold text-amber-800 mb-2">大量批發報價門檻</p>
                    <div className="flex items-center justify-between">
                      <span className="text-xs text-stone-600">滿幾件跳出專人報價提示？</span>
                      <input type="number" value={tempConfig.wholesaleThreshold} onChange={e => setTempConfig({...tempConfig, wholesaleThreshold: e.target.value})} className="w-20 bg-white border border-amber-300 rounded p-1 text-sm outline-none text-right font-bold text-amber-700 focus:border-amber-500" />
                    </div>
                  </div>
                </div>

                <button onClick={saveSystemConfig} className="mt-5 w-full bg-stone-800 text-white font-bold py-3 rounded-xl shadow-md active:scale-95 transition-transform flex justify-center items-center gap-2">
                  儲存設定
                </button>
              </div>
            </div>
          )}

          {/* 登入彈出視窗 */}
          {showLoginModal && (
            <div className="fixed inset-0 z-50 flex justify-center items-center bg-black/50 backdrop-blur-sm px-4">
              <div className="bg-white p-6 rounded-3xl shadow-2xl w-full max-w-xs animate-in zoom-in-95 duration-200">
                <h3 className="text-lg font-bold text-stone-800 mb-4 flex items-center gap-2 justify-center"><Lock size={20} className="text-amber-600" /> 管理員登入</h3>
                <input type="email" placeholder="Email 帳號" value={emailInput} onChange={(e) => setEmailInput(e.target.value)} className="w-full bg-stone-50 border border-stone-200 rounded-xl px-4 py-3 mb-3 outline-none focus:border-amber-500 font-medium"/>
                <input type="password" placeholder="密碼" value={passwordInput} onChange={(e) => setPasswordInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleLoginSubmit()} className="w-full bg-stone-50 border border-stone-200 rounded-xl px-4 py-3 mb-5 outline-none focus:border-amber-500 font-medium"/>
                <div className="flex gap-3">
                  <button onClick={() => { setShowLoginModal(false); setEmailInput(''); setPasswordInput(''); }} className="flex-1 bg-stone-100 text-stone-600 font-bold py-3 rounded-xl active:scale-95 transition-transform">取消</button>
                  <button onClick={handleLoginSubmit} className="flex-1 bg-amber-500 text-white font-bold py-3 rounded-xl shadow-md active:scale-95 transition-transform">登入</button>
                </div>
              </div>
            </div>
          )}

          {/* 聯絡我們彈出視窗 (與之前相同) */}
          {showContactModal && (
            <div className="fixed inset-0 z-50 flex justify-center items-center bg-black/50 backdrop-blur-sm px-4">
              <div className="bg-[#Fdfbf7] p-6 rounded-3xl shadow-2xl w-full max-w-sm animate-in zoom-in-95 duration-200 relative border border-stone-100">
                <button onClick={() => setShowContactModal(false)} className="absolute top-4 right-4 text-stone-400 hover:bg-stone-100 p-1 rounded-full transition-colors"><X size={20} /></button>
                <div className="flex flex-col items-center mb-6">
                  <div className="h-16 mb-3 flex items-center justify-center">{logo ? <img src={logo} alt="Logo" className="max-h-full max-w-[120px] object-contain" /> : <Store size={40} className="text-amber-700" />}</div>
                  <h2 className="text-xl font-bold text-stone-800">聯絡我們</h2>
                </div>
                <div className="space-y-4">
                  <div className="flex items-start gap-3"><div className="bg-stone-100 p-2 rounded-full text-stone-500 shrink-0"><MapPin size={18} /></div><div className="flex-1"><p className="text-xs font-bold text-stone-400 mb-1">地點</p>{isAdminMode ? <input type="text" value={contactData.address} onChange={e => setContactData({...contactData, address: e.target.value})} placeholder="門市地址" className="w-full bg-white border border-stone-200 rounded-lg px-3 py-2 text-sm outline-none focus:border-amber-500" /> : <p className="text-sm text-stone-700 font-medium">{contactData.address || '尚未設定'}</p>}</div></div>
                  <div className="flex items-start gap-3"><div className="bg-stone-100 p-2 rounded-full text-stone-500 shrink-0"><Phone size={18} /></div><div className="flex-1"><p className="text-xs font-bold text-stone-400 mb-1">電話</p>{isAdminMode ? <input type="tel" value={contactData.phone} onChange={e => setContactData({...contactData, phone: e.target.value})} placeholder="聯絡電話" className="w-full bg-white border border-stone-200 rounded-lg px-3 py-2 text-sm outline-none focus:border-amber-500" /> : (contactData.phone ? <a href={`tel:${contactData.phone}`} className="text-sm font-bold text-amber-600 hover:underline">{contactData.phone}</a> : <p className="text-sm text-stone-700 font-medium">尚未設定</p>)}</div></div>
                  <div className="flex items-start gap-3"><div className="bg-[#06C755]/10 p-2 rounded-full text-[#06C755] shrink-0"><MessageCircle size={18} /></div><div className="flex-1"><p className="text-xs font-bold text-stone-400 mb-1">LINE 連結</p>{isAdminMode ? <input type="url" value={contactData.lineLink} onChange={e => setContactData({...contactData, lineLink: e.target.value})} placeholder="https://line.me/..." className="w-full bg-white border border-stone-200 rounded-lg px-3 py-2 text-sm outline-none focus:border-amber-500" /> : (contactData.lineLink ? <a href={contactData.lineLink} target="_blank" rel="noreferrer" className="text-sm font-bold text-[#06C755] hover:underline">點我加 LINE 聯繫</a> : <p className="text-sm text-stone-700 font-medium">尚未設定</p>)}</div></div>
                  <div className="flex items-start gap-3"><div className="bg-stone-100 p-2 rounded-full text-stone-500 shrink-0"><Mail size={18} /></div><div className="flex-1"><p className="text-xs font-bold text-stone-400 mb-1">Email</p>{isAdminMode ? <input type="email" value={contactData.email} onChange={e => setContactData({...contactData, email: e.target.value})} placeholder="Email" className="w-full bg-white border border-stone-200 rounded-lg px-3 py-2 text-sm outline-none focus:border-amber-500" /> : (contactData.email ? <a href={`mailto:${contactData.email}`} className="text-sm font-bold text-amber-600 hover:underline break-all">{contactData.email}</a> : <p className="text-sm text-stone-700 font-medium">尚未設定</p>)}</div></div>
                </div>
                {isAdminMode && <button onClick={saveContactInfo} className="mt-6 w-full bg-amber-500 text-white font-bold py-3 rounded-xl shadow-md active:scale-95 transition-transform">儲存聯絡資訊</button>}
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
